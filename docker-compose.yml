version: "3.9"
services:
  ollama:
    image: ollama/ollama
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
    mem_limit: ${OLLAMA_MEM_LIMIT}
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma
    ports:
      - "${CHROMA_PORT}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "${API_PORT}:8000"
    env_file:
      - .env
    depends_on:
      - ollama
      - chromadb
    volumes:
      - ./docs:/app/docs
    restart: unless-stopped

  ui:
    build: ./ui
    ports:
      - "${UI_PORT}:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data: